name: Birthday Reminder Scheduler
on:
  schedule:
    - cron: "0 2 * * *"   # Daily 2:00 AM UTC = 7:30 AM IST
  workflow_dispatch:
permissions:
  contents: write
jobs:
  send-birthday-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Keep workflow alive
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git pull origin main --rebase
          git commit --allow-empty -m "chore: keep alive $(date)"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run birthday reminder script
        env:
          PASSWORD_API_KEY: ${{ secrets.PASSWORD_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python birthday_sender.py
      - name: Send Failure Notification
        if: failure()
        run: |
          python - <<EOF
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText("❌ Birthday Reminder Job FAILED")
          msg["Subject"] = "Birthday Automation Failure"
          msg["From"] = os.environ["EMAIL_SENDER"]
          msg["To"] = os.environ["EMAIL_RECEIVER"]
          s = smtplib.SMTP("smtp.gmail.com", 587)
          s.starttls()
          s.login(os.environ["EMAIL_SENDER"], os.environ["PASSWORD_API_KEY"])
          s.send_message(msg)
          s.quit()
          EOF
        env:
          PASSWORD_API_KEY: ${{ secrets.PASSWORD_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}